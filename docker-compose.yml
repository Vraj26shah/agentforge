services:
  spacetimedb:
    image: clockworklabs/spacetime:latest
    ports:
      - "3001:3000"
    volumes:
      - spacetimedb_data:/var/lib/spacetimedb
    command: start
    healthcheck:
      test: ["CMD", "sh", "-c", "exec 3<>/dev/tcp/localhost/3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  spacetimedb-init:
    image: clockworklabs/spacetime:latest
    depends_on:
      spacetimedb:
        condition: service_started
    volumes:
      - ./spacetimedb:/module
    working_dir: /module
    entrypoint: ["sh", "-c"]
    command: "spacetime publish --server http://spacetimedb:3000 agentforge || true"
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # host networking: backend shares host network stack, so it can reach
    # Ollama at localhost:11434 directly (no host.docker.internal needed)
    network_mode: host
    environment:
      # Ollama — reachable on host loopback
      - OLLAMA_API_URL=http://localhost:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2:0.5b}
      - USE_OLLAMA=true
      # Gemini
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      # ArmorIQ
      - ARMORIQ_API_KEY=${ARMORIQ_API_KEY:-}
      - ARMORIQ_SECRET_KEY=${ARMORIQ_SECRET_KEY:-dev-secret-key}
      - ARMORIQ_USER_ID=${ARMORIQ_USER_ID:-agentforge-user}
      - ARMORIQ_AGENT_ID=${ARMORIQ_AGENT_ID:-agentforge-agent}
      - ARMORIQ_CONTEXT_ID=${ARMORIQ_CONTEXT_ID:-default}
      - ARMORIQ_TOKEN_VALIDITY=${ARMORIQ_TOKEN_VALIDITY:-600}
      # SpacetimeDB — reachable via host-mapped port 3001
      - SPACETIMEDB_URL=http://localhost:3001
      - SPACETIMEDB_HOST=localhost
      - SPACETIMEDB_PORT=3001
      # General
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CODESPACE_ROOT=/workspace
    volumes:
      - ./backend:/app
      - .:/workspace:rw
    depends_on:
      spacetimedb:
        condition: service_started
      spacetimedb-init:
        condition: service_started
    restart: unless-stopped
    # Listen on 8001 to match VITE_BACKEND_URL=http://localhost:8001
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:8001
      - VITE_SPACETIMEDB_URL=http://localhost:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0

volumes:
  spacetimedb_data:
