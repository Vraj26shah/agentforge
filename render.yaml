services:
  # ── Backend: Python FastAPI (Docker) ──────────────────────────────────────────
  - type: web
    name: agentforges-api
    env: docker
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: OLLAMA_API_URL
        value: http://localhost:11434
      - key: OLLAMA_MODEL
        value: qwen2:0.5b
      - key: USE_OLLAMA
        value: true
      - key: GEMINI_API_KEY
        sync: false
      - key: ARMORIQ_API_KEY
        sync: false
      - key: ARMORIQ_SECRET_KEY
        sync: false
      - key: ARMORIQ_USER_ID
        value: agentforge-user
      - key: ARMORIQ_AGENT_ID
        value: agentforge-agent
      - key: ARMORIQ_CONTEXT_ID
        value: default
      - key: ARMORIQ_API_ENDPOINT
        value: https://api.armoriq.ai/v1
      - key: ARMORIQ_TOKEN_VALIDITY
        value: 600
      - key: SPACETIMEDB_URL
        value: http://localhost:3000
      - key: SPACETIMEDB_HOST
        value: localhost
      - key: SPACETIMEDB_PORT
        value: 3000
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CODESPACE_ROOT
        value: /app

  # ── Frontend: Static Site ─────────────────────────────────────────────────────
  - type: web
    name: agentforges
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_BACKEND_URL
        value: https://agentforges-api.onrender.com
